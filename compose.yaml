# compose.yaml — stack SIGITAL. Jalankan dengan:
#   Podman (Windows):  podman compose up -d   (atau: podman-compose up -d)
#   Docker:            docker compose up -d
services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sigital}
      POSTGRES_USER: ${DB_USERNAME:-sigital}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sigital}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: docker.io/library/redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
    env_file: .env.docker
    ports:
      - "8000:8000"
    volumes:
      - storage:/var/www/html/storage/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
    env_file: .env.docker
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=120"]
    volumes:
      - storage:/var/www/html/storage/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
    env_file: .env.docker
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - storage:/var/www/html/storage/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  storage:
